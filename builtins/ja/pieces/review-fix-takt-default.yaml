name: review-fix-takt-default
description: TAKTй–Ӣзҷәеҗ‘гҒ‘еӨҡи§’гғ¬гғ“гғҘгғјпјӢдҝ®жӯЈгғ«гғјгғ—пјҲAIгӮўгғігғҒгғ‘гӮҝгғјгғігӮ’еҗ«гӮҖ6иҰізӮ№гғ¬гғ“гғҘгғјпјӢеҸҚеҫ©дҝ®жӯЈпјү
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 30
initial_movement: gather
loop_monitors:
  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction_template: loop-monitor-reviewers-fix
      rules:
        - condition: еҒҘе…ЁпјҲйҖІжҚ—гҒӮгӮҠпјү
          next: reviewers
        - condition: йқһз”ҹз”Јзҡ„пјҲеҗҢгҒҳжҢҮж‘ҳгҒ®еҸҚеҫ©гғ»дҝ®жӯЈжңӘеҸҚжҳ пјү
          next: supervise

movements:
  - name: gather
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: гғ¬гғ“гғҘгғјеҜҫиұЎгҒ®жғ…е ұеҸҺйӣҶе®ҢдәҶ
        next: reviewers
      - condition: гғ¬гғ“гғҘгғјеҜҫиұЎгӮ’зү№е®ҡгҒ§гҒҚгҒӘгҒ„гҖҒжғ…е ұдёҚи¶і
        next: ABORT
        appendix: |
          зўәиӘҚдәӢй …:
          - {иіӘе•Ҹ1}
          - {иіӘе•Ҹ2}

  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge:
          - architecture
          - takt
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-arch
        output_contracts:
          report:
            - name: architecture-review.md
              format: architecture-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: security-review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge: security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: qa-review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: testing-review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - testing
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-test
        output_contracts:
          report:
            - name: testing-review.md
              format: testing-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: ai-antipattern-review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: ai-review
        output_contracts:
          report:
            - name: ai-review.md
              format: ai-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: requirements-review
        edit: false
        persona: requirements-reviewer
        policy: review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-requirements
        output_contracts:
          report:
            - name: requirements-review.md
              format: requirements-review
        rules:
          - condition: approved
          - condition: needs_fix

    rules:
      - condition: all("approved")
        next: supervise
      - condition: any("needs_fix")
        next: fix

  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - takt
      - architecture
      - security
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: fix
    rules:
      - condition: дҝ®жӯЈе®ҢдәҶ
        next: reviewers
      - condition: еҲӨж–ӯгҒ§гҒҚгҒӘгҒ„гҖҒжғ…е ұдёҚи¶і
        next: ABORT

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: supervise
    pass_previous_response: false
    rules:
      - condition: гҒҷгҒ№гҒҰе•ҸйЎҢгҒӘгҒ—
        next: COMPLETE
      - condition: иҰҒжұӮжңӘйҒ”жҲҗгҖҒгғҶгӮ№гғҲеӨұж•—гҖҒгғ“гғ«гғүгӮЁгғ©гғј
        next: ABORT
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
