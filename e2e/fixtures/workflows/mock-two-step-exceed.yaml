name: e2e-mock-two-step-exceed
description: Two-step workflow with max_steps=1 for testing --ignore-exceed
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
personas:
  test-coder: |
    You are the E2E test coder.
max_steps: 1
initial_step: step-1
steps:
  - name: step-1
    edit: true
    persona: test-coder
    required_permission_mode: edit
    instruction: |
      {task}
    rules:
      - condition: Done
        next: step-2
  - name: step-2
    edit: true
    persona: test-coder
    required_permission_mode: edit
    instruction: |
      Continue the task.
    rules:
      - condition: Done
        next: COMPLETE
